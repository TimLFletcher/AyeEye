name: Refresh AI Discoverability Report

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
        run: |
          node --version
          npm --version
          npm run evaluate

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/report.encrypted.json docs/data/meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh encrypted discoverability report"
          git push
